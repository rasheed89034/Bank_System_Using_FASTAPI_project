<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #ffffff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        
        .tab-buttons { display: flex; justify-content: space-between; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; padding: 10px; cursor: pointer; font-weight: bold; color: #555; transition: 0.3s; }
        .tab-btn.active { color: #007bff; border-bottom: 2px solid #007bff; }

        .content { display: none; }
        .content.active { display: block; animation: fadeIn 0.5s; }

        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button.action-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Bank Portal</h2>

    <div class="tab-buttons">
        <button class="tab-btn active" onclick="openTab(event, 'deposit')">Deposit</button>
        <button class="tab-btn" onclick="openTab(event, 'withdraw')">Withdraw</button>
        <button class="tab-btn" onclick="openTab(event, 'balance')">Balance</button>
    </div>

    <div id="deposit" class="content active">
        <form action="/deposit" method="POST">
            <input type="hidden" name="user_id" value="{{ user_id }}">
            <input type="number" name="amount" placeholder="Enter Deposit Amount" required>
            <button type="submit" class="action-btn" style="background-color: #28a745;">Deposit Money</button>
        </form>
    </div>

    <div id="withdraw" class="content">
        <form action="/withdraw" method="POST">
            <input type="hidden" name="user_id" value="{{ user_id }}">
            <input type="number" name="amount" placeholder="Enter Withdrawal Amount" required>
            <button type="submit" class="action-btn" style="background-color: #dc3545;">Withdraw Money</button>
        </form>
    </div>

    <div id="balance" class="content">
        <h3 id="balance-display">Rs {{current_balance}}</h3>
        <p>Current Account Balance</p>
        <button onclick="window.location.reload()" class="action-btn" style="background-color: #007bff;">Refresh Balance</button>
    </div>
</div>

<script>
    function openTab(evt, tabName) {
        let contents = document.getElementsByClassName("content");
        for (let i = 0; i < contents.length; i++) contents[i].style.display = "none";
        
        let buttons = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < buttons.length; i++) buttons[i].className = buttons[i].className.replace(" active", "");

        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }
</script>

</body>
</html>
