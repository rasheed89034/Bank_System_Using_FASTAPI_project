<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bank Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding-top: 100px; }
        .form-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #28a745; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Bank Login</h2>
        {% if message %}
            <p class="msg" style="color: #28a745;">{{ message }}</p>
        {% endif %}
        {% if error %}
            <p class="msg" style="color: #dc3545;">{{ error }}</p>
        {% endif %}
        <form action="/login" method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </form> <div style="margin-top: 15px; text-align: center;">
        <p style="font-size: 14px; color: #555;">Don't have an account?</p>
        <button onclick="window.location.href='/signup'" style="background: #007bff; width: 100%;">Create New Account</button>
    </div>
    </div>
</body>
</html>
